<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Slide - Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .slide-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; }
        .slide-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-emerald-600 text-white py-8 px-4 shadow-lg text-center">
        <h1 class="text-3xl font-black uppercase tracking-tight italic">Python Slide</h1>
        <p class="text-emerald-100 mt-2 font-medium">คลังสไลด์ประกอบการสอน Python</p>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div class="flex flex-col md:flex-row gap-6">
            <div class="w-full md:w-80 shrink-0 space-y-2" id="tabs-container">
            </div>
            
            <div class="flex-1">
                <div id="slide-display" class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                    <div class="slide-container">
                        <iframe id="main-player" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-6">
                        <h2 id="current-slide-title" class="text-2xl font-black text-slate-800 italic uppercase tracking-tight">เลือกบทเรียน</h2>
                        <div class="mt-4 flex items-center justify-between">
                            <p class="text-slate-500 font-medium">สไลด์ประกอบการสอน Python แต่ละบท</p>
                            <a id="external-link" href="#" target="_blank" class="bg-emerald-600 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-emerald-700 transition-all flex items-center">
                                <i class="fas fa-external-link-alt mr-2"></i> เปิดบน Google Drive
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const slideData = [
            { title: "บทที่ 1 Overview", url: "https://drive.google.com/file/d/1HsLz-Zs1lUoxEMo0XtMDSTBxIL8Mkx_e/view?usp=sharing" },
            { title: "บทที่ 2 Flowchart", url: "https://drive.google.com/file/d/1P6_41Gv-O9JwMm8nOmJ-1zh__uRHZlgc/view?usp=sharing" },
            { title: "บทที่ 3 คำสั่ง print", url: "https://drive.google.com/file/d/18tSQkMcKZtFS5g45QjSMDhf6Yo1ujVnC/view?usp=sharing" },
            { title: "บทที่ 4 ตัวแปร variable", url: "https://drive.google.com/file/d/1FTn-mKS1Apr4EhSuk9g_P6clIGPSsx3K/view?usp=sharing" },
            { title: "บทที่ 5 การคำนวน Operator", url: "https://drive.google.com/file/d/1gEI1DvGogcbGdntIFOMKnh8tPD9WfjeW/view?usp=sharing" },
            { title: "บทที่ 6 เงื่อนไข condition", url: "https://drive.google.com/file/d/1KB-xC9xfoR4AmDFsJtWmdYIy6wSCcU-n/view?usp=sharing" },
            { title: "บทที่ 7 loop", url: "https://drive.google.com/file/d/1uk298rV5Z53RgQYIMkcjvXszfsrIgJcl/view?usp=sharing" },
            { title: "บทที่ 8 function", url: "https://drive.google.com/file/d/1b_MswD-FJX1rcAJn8sJhpjYXBMsS2yJK/view?usp=sharing" },
            { title: "บทที่ 9 Collection list tuple", url: "https://drive.google.com/file/d/1bcwKe06a8-2Wbir6rNhVP-hWK8V9NrRt/view?usp=sharing" },
            { title: "บทที่ 10 GUI", url: "https://drive.google.com/file/d/14968u-bAS3POhdGqKgIFI4EbWisLSNqi/view?usp=sharing" },
            { title: "บทที่ 11 Unit Test", url: "https://docs.google.com/presentation/d/1XVkZQZr_2ISgdTP0fZc2Iz5E2PJUUWae/edit?usp=sharing" },
            { title: "บทที่ 12 debugging", url: "https://drive.google.com/file/d/1Sfrk5PLk-zCWSQknPqrH5cA4zLhGwVlf/view?usp=sharing" }
        ];

        function convertToEmbed(url) {
            if (url.includes('docs.google.com/presentation')) {
                const id = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                return id ? `https://docs.google.com/presentation/d/${id[1]}/embed` : url;
            }
            const id = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            return id ? `https://drive.google.com/file/d/${id[1]}/preview` : url;
        }

        const tabsContainer = document.getElementById('tabs-container');
        const player = document.getElementById('main-player');
        const titleEl = document.getElementById('current-slide-title');
        const linkEl = document.getElementById('external-link');

        function selectSlide(index) {
            const slide = slideData[index];
            player.src = convertToEmbed(slide.url);
            titleEl.innerText = slide.title;
            linkEl.href = slide.url;

            document.querySelectorAll('.tab-item').forEach((tab, i) => {
                tab.classList.toggle('bg-emerald-600', i === index);
                tab.classList.toggle('text-white', i === index);
                tab.classList.toggle('bg-white', i !== index);
                tab.classList.toggle('text-slate-600', i !== index);
            });
        }

        slideData.forEach((slide, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-item w-full text-left p-4 rounded-2xl transition-all duration-200 font-bold text-sm shadow-sm border border-slate-200 flex items-center space-x-3 ${index === 0 ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600'}`;
            btn.innerHTML = `<span class="w-6 h-6 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-[10px] font-black">${index + 1}</span> <span>${slide.title}</span>`;
            btn.onclick = () => selectSlide(index);
            tabsContainer.appendChild(btn);
        });

        selectSlide(0);
    </script>
</body>
</html>
