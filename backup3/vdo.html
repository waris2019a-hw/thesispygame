<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pygame Clip - Video Lessons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-indigo-600 text-white py-8 px-4 shadow-lg text-center">
        <h1 class="text-3xl font-black uppercase tracking-tight italic">Pygame Clip</h1>
        <p class="text-indigo-100 mt-2 font-medium">คลังวิดีโอบทเรียนการเขียนโปรแกรม Python</p>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div class="flex flex-col md:flex-row gap-6">
            <!-- Sidebar Tabs -->
            <div class="w-full md:w-80 shrink-0 space-y-2" id="tabs-container">
                <!-- Tabs will be injected here -->
            </div>
            
            <!-- Video Display Area -->
            <div class="flex-1">
                <div id="video-display" class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                    <div class="video-container">
                        <iframe id="main-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="p-6">
                        <h2 id="current-video-title" class="text-2xl font-black text-slate-800 italic uppercase tracking-tight">เลือกบทเรียนที่ต้องการรับชม</h2>
                        <div class="mt-4 flex items-center justify-between">
                            <p class="text-slate-500 font-medium">เรียนรู้การเขียนโปรแกรม Python ผ่านวิดีโอสาธิต</p>
                            <a id="external-link" href="#" target="_blank" class="bg-red-600 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-red-700 transition-all flex items-center">
                                <i class="fab fa-youtube mr-2"></i> ดูบน YouTube
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const videoData = [
            { title: "บทที่ 1 Overview", url: "https://www.youtube.com/watch?v=_yBHYFGUPXc" },
            { title: "บทที่ 2 Flowchart", url: "https://www.youtube.com/watch?v=6JJDrcpvjAM" },
            { title: "บทที่ 3 คำสั่ง print", url: "https://www.youtube.com/watch?v=W00CABuXRtI" },
            { title: "บทที่ 4 ตัวแปร variable", url: "https://www.youtube.com/watch?v=AWBnk1FE_44" },
            { title: "บทที่ 5 การคำนวน Operator", url: "https://youtu.be/mpphF5UaG1M" },
            { title: "บทที่ 6 เงื่อนไข condition", url: "https://www.youtube.com/watch?v=8QjntFTI2EY" },
            { title: "บทที่ 7 loop", url: "https://www.youtube.com/watch?v=nXUBzYNbTEk" },
            { title: "บทที่ 8 function", url: "https://www.youtube.com/watch?v=i7s2jjBqW_k" },
            { title: "บทที่ 9 Collection list tuple", url: "https://www.youtube.com/watch?v=4k5bz9CfXQY" },
            { title: "บทที่ 10 GUI", url: "https://youtu.be/G5HS7nufW8o" },
            { title: "บทที่ 11 Unit Test", url: "https://www.youtube.com/watch?v=TKU9HVaoKwk" },
            { title: "บทที่ 12 debugging", url: "https://www.youtube.com/watch?v=myxGLALWmC8s" }
        ];

        function convertToEmbed(url) {
            let videoId = '';
            if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('youtube.com/watch?v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            }
            return `https://www.youtube.com/embed/${videoId}`;
        }

        const tabsContainer = document.getElementById('tabs-container');
        const player = document.getElementById('main-player');
        const titleEl = document.getElementById('current-video-title');
        const linkEl = document.getElementById('external-link');

        function selectVideo(index) {
            const video = videoData[index];
            player.src = convertToEmbed(video.url);
            titleEl.innerText = video.title;
            linkEl.href = video.url;

            document.querySelectorAll('.tab-item').forEach((tab, i) => {
                tab.classList.toggle('bg-indigo-600', i === index);
                tab.classList.toggle('text-white', i === index);
                tab.classList.toggle('bg-white', i !== index);
                tab.classList.toggle('text-slate-600', i !== index);
            });
        }

        videoData.forEach((video, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-item w-full text-left p-4 rounded-2xl transition-all duration-200 font-bold text-sm shadow-sm border border-slate-200 flex items-center space-x-3 ${index === 0 ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600'}`;
            btn.innerHTML = `<span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px] font-black">${index + 1}</span> <span>${video.title}</span>`;
            btn.onclick = () => selectVideo(index);
            tabsContainer.appendChild(btn);
        });

        // Load first video by default
        selectVideo(0);
    </script>
</body>
</html>
