<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Score - Python Fantasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkRS0JyVqO8l4scTBAnB93D3B7BeAAE9w",
            authDomain: "scorestudent-f18c5.firebaseapp.com",
            databaseURL: "https://scorestudent-f18c5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "scorestudent-f18c5",
            storageBucket: "scorestudent-f18c5.firebasestorage.app",
            messagingSenderId: "55893928684",
            appId: "1:55893928684:web:fcee9b42d6b8b87df853c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let scoreData = [];

        function exportCSV() {
            if (!scoreData.length) {
                alert('ไม่มีข้อมูลให้ส่งออก');
                return;
            }
            const headers = ['รหัส', 'ชื่อ-นามสกุล', 'ก่อนเรียน', 'หลังเรียน', 'พัฒนาการ'];
            const rows = scoreData.map(d => [
                d.studentId || '-',
                d.name || '-',
                d.pretest || 0,
                d.posttest || 0,
                (d.posttest || 0) - (d.pretest || 0)
            ]);
            const csvContent = [headers, ...rows]
                .map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0, 10);
            link.href = url;
            link.download = `report_scores_${timestamp}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        async function fetchScores() {
            const tableBody = document.getElementById('score-table-body');
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">กำลังโหลดข้อมูล...</td></tr>';
            
            try {
                const q = query(collection(db, 'test_scores'), orderBy('name', 'asc'));
                const snapshot = await getDocs(q);
                tableBody.innerHTML = '';
                scoreData = [];

                if (snapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">ไม่พบข้อมูลการทดสอบ</td></tr>';
                    return;
                }

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const pre = data.pretest || 0;
                    const post = data.posttest || 0;
                    const diff = post - pre;
                    const diffColor = diff >= 0 ? 'text-green-600' : 'text-red-600';
                    const diffIcon = diff >= 0 ? 'fa-arrow-up' : 'fa-arrow-down';

                    scoreData.push(data);

                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-100 hover:bg-slate-50 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium text-slate-700">${data.studentId || '-'}</td>
                        <td class="px-6 py-4 text-slate-800">${data.name || '-'}</td>
                        <td class="px-6 py-4 text-center font-bold">${pre} / 20</td>
                        <td class="px-6 py-4 text-center font-bold">${post} / 20</td>
                        <td class="px-6 py-4 text-center font-bold ${diffColor}">
                            <i class="fas ${diffIcon} mr-1 text-xs"></i> ${diff}
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (e) {
                console.error(e);
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-red-400">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            }
        }

        window.exportCSV = exportCSV;
        window.fetchScores = fetchScores;

        window.addEventListener('DOMContentLoaded', () => {
            const refreshBtn = document.getElementById('btn-refresh');
            const exportBtn = document.getElementById('btn-export');
            if (refreshBtn) refreshBtn.addEventListener('click', fetchScores);
            if (exportBtn) exportBtn.addEventListener('click', exportCSV);
            fetchScores();
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?sfamily=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 uppercase italic">Learning Report</h1>
                <p class="text-slate-500">เปรียบเทียบผลคะแนนก่อนเรียนและหลังเรียน - เรื่อง print()</p>
            </div>
            <div class="flex gap-2">
                <button id="btn-refresh" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i> รีเฟรชข้อมูล
                </button>
                <button id="btn-export" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-emerald-700 transition-all flex items-center gap-2">
                    <i class="fas fa-file-csv"></i> Export CSV
                </button>
            </div>
        </header>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-black uppercase text-slate-400 tracking-widest">รหัส</th>
                        <th class="px-6 py-4 text-xs font-black uppercase text-slate-400 tracking-widest">ชื่อ-นามสกุล</th>
                        <th class="px-6 py-4 text-center text-xs font-black uppercase text-slate-400 tracking-widest">ก่อนเรียน</th>
                        <th class="px-6 py-4 text-center text-xs font-black uppercase text-slate-400 tracking-widest">หลังเรียน</th>
                        <th class="px-6 py-4 text-center text-xs font-black uppercase text-slate-400 tracking-widest">พัฒนาการ</th>
                    </tr>
                </thead>
                <tbody id="score-table-body">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
